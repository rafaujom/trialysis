name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  typecheck-and-lint:
    name: Type check & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: trialysis_test
          ANTHROPIC_API_KEY: sk-placeholder

      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0
